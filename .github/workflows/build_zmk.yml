name: Build ZMK Firmware

on:
  push:
    branches: [main, master]
    tags:
      - "zmk_v*"
    paths:
      - "zmk/**"
      - ".github/workflows/build_zmk.yml"
  pull_request:
    paths:
      - "zmk/**"
  workflow_dispatch:

jobs:
  matrix:
    runs-on: ubuntu-latest
    name: Fetch Build Keyboards
    outputs:
      build_matrix: ${{ env.build_matrix }}
    steps:
      - uses: actions/checkout@v4
      - name: Fetch Build Matrix
        run: |
          echo "build_matrix=$(yq -oj -I0 'zmk/cck_ball/build.yaml')" >> $GITHUB_ENV

  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    needs: matrix
    name: Build
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix.outputs.build_matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create build directory
        run: |
          echo "build_dir=$(mktemp -d)" >> $GITHUB_ENV

      - name: Prepare variables
        shell: bash -x {0}
        env:
          board: ${{ matrix.board }}
          shield: ${{ matrix.shield }}
          artifact_name: ${{ matrix.artifact-name }}
          snippet: ${{ matrix.snippet }}
        run: |
          if [ -n "${snippet}" ]; then
            extra_west_args="-S \"${snippet}\""
          fi

          echo "zephyr_version=${ZEPHYR_VERSION}" >> $GITHUB_ENV
          echo "extra_west_args=${extra_west_args}" >> $GITHUB_ENV
          echo "extra_cmake_args=${shield:+-DSHIELD=\"$shield\"}" >> $GITHUB_ENV
          echo "display_name=${shield:+$shield - }${board}" >> $GITHUB_ENV
          echo "artifact_name=${artifact_name:-${shield:+$shield-}${board//\//_}-zmk}" >> $GITHUB_ENV

      - name: Set up west workspace
        run: |
          # Copy ZMK config to a temporary workspace so west init works correctly
          cp -r zmk/cck_ball/config /tmp/zmk-config
          cd /tmp
          west init -l /tmp/zmk-config
          echo "west_workspace=/tmp" >> $GITHUB_ENV

      - name: Cache west modules
        uses: actions/cache@v4
        continue-on-error: true
        env:
          cache_name: cache-zephyr-${{ env.zephyr_version }}-modules
        with:
          path: |
            /tmp/modules/
            /tmp/tools/
            /tmp/zephyr/
            /tmp/bootloader/
            /tmp/zmk/
          key: ${{ runner.os }}-build-${{ env.cache_name }}-${{ hashFiles('zmk/cck_ball/config/west.yml', 'zmk/cck_ball/build.yaml') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache_name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-

      - name: West Update
        working-directory: /tmp
        run: west update --fetch-opt=--filter=tree:0

      - name: West Zephyr export
        working-directory: /tmp
        run: west zephyr-export

      - name: West Build (${{ env.display_name }})
        working-directory: /tmp
        shell: sh -x {0}
        run: >
          west build -s zmk/app -d "${{ env.build_dir }}" -b "${{ matrix.board }}"
          ${{ env.extra_west_args }}
          -- -DZMK_CONFIG=/tmp/zmk-config ${{ env.extra_cmake_args }} ${{ matrix.cmake-args }}

      - name: ${{ env.display_name }} Kconfig file
        run: |
          if [ -f "${{ env.build_dir }}/zephyr/.config" ]; then
            grep -v -e "^#" -e "^$" "${{ env.build_dir }}/zephyr/.config" | sort
          fi
        if: ${{ !cancelled() }}

      - name: Rename artifacts
        shell: sh -x {0}
        run: |
          mkdir "${{ env.build_dir }}/artifacts"
          if [ -f "${{ env.build_dir }}/zephyr/zmk.uf2" ]; then
            cp "${{ env.build_dir }}/zephyr/zmk.uf2" "${{ env.build_dir }}/artifacts/${{ env.artifact_name }}.uf2"
          elif [ -f "${{ env.build_dir }}/zephyr/zmk.bin" ]; then
            cp "${{ env.build_dir }}/zephyr/zmk.bin" "${{ env.build_dir }}/artifacts/${{ env.artifact_name }}.bin"
          fi

      - name: Archive (${{ env.display_name }})
        uses: actions/upload-artifact@v4
        with:
          name: artifact-${{ env.artifact_name }}
          path: ${{ env.build_dir }}/artifacts

  merge:
    runs-on: ubuntu-latest
    needs: build
    name: Merge Output Artifacts
    steps:
      - name: Merge Artifacts
        uses: actions/upload-artifact/merge@v4
        with:
          name: firmware
          pattern: artifact-*
          delete-merged: true

  release:
    runs-on: ubuntu-latest
    needs: merge
    if: startsWith(github.ref, 'refs/tags/zmk_v')
    permissions:
      contents: write
    steps:
      - name: Extract version info
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          VERSION=${TAG#zmk_v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download firmware artifacts
        uses: actions/download-artifact@v4
        with:
          name: firmware
          path: firmware

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: firmware/*
          name: "ZMK ${{ steps.version.outputs.tag }}"
          body: |
            ## ZMK Firmware Release ${{ steps.version.outputs.version }}
            **Boards:** CCK-BALL (left + right + settings_reset)
          generate_release_notes: true
          draft: false
          prerelease: false
