name: Build QMK Firmware

on:
  push:
    branches: ["main", "master"]
    tags:
      - "qmk_v*"
    paths:
      - "qmk/**"
      - "scripts/**"
      - ".github/workflows/build_qmk.yml"
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  # Generate the build matrix dynamically from qmk.json
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.read.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - name: Generate build matrix from qmk.json
        id: read
        run: |
          matrix=$(jq -c '[.keyboards[] | {
            keyboard: .keyboard,
            keymap:   .keymap,
            repo:     .repo,
            ref:      .ref,
            name:     (.keyboard | gsub("/"; "_"))
          }]' qmk/qmk.json)
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  build:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # build all boards even if one fails
      matrix:
        include: ${{ fromJson(needs.setup.outputs.matrix) }}

    name: "${{ matrix.keyboard }}:${{ matrix.keymap }} @ ${{ matrix.ref }}"

    steps:
      - name: Checkout userspace
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            gcc-arm-none-eabi \
            avr-libc \
            gcc-avr \
            python3-pip \
            python3-setuptools \
            git \
            jq \
            dfu-util
          python3 -m pip install --user qmk

      - name: Build ${{ matrix.keyboard }}
        run: |
          chmod +x scripts/build_qmk.sh
          bash scripts/build_qmk.sh \
            "${{ matrix.keyboard }}" \
            "${{ matrix.keymap }}" \
            "${{ matrix.repo }}" \
            "${{ matrix.ref }}" \
            "$GITHUB_WORKSPACE/qmk" \
            "$GITHUB_WORKSPACE"

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.name }}-${{ github.sha }}
          path: firmware/
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/qmk_v')
    permissions:
      contents: write

    steps:
      - name: Extract version info
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          VERSION=${TAG#qmk_v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download all firmware artifacts
        uses: actions/download-artifact@v4
        with:
          path: all_firmware
          pattern: firmware-*
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "QMK ${{ steps.version.outputs.tag }}"
          body: |
            ## QMK Firmware Release ${{ steps.version.outputs.version }}
            Per-board versions are defined in [qmk.json](https://github.com/${{ github.repository }}/blob/master/qmk/qmk.json).
          files: all_firmware/*
          generate_release_notes: true
          draft: false
          prerelease: false
